<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Flores — vintage-wallpaper damask diaper. Tone-on-tone warm ink, low
       opacity, designed to tile seamlessly (corner motifs complete across seams). -->
  <defs>
    <g id="fl" fill="none" stroke="#6f4f33" stroke-width="1.15">
      <circle cx="0" cy="-4.2" r="3.4"/>
      <circle cx="0" cy="4.2" r="3.4"/>
      <circle cx="-4.2" cy="0" r="3.4"/>
      <circle cx="4.2" cy="0" r="3.4"/>
      <circle cx="0" cy="0" r="1.3"/>
    </g>
  </defs>

  <!-- ogee stems forming the lattice -->
  <g stroke="#6f4f33" stroke-opacity="0.12" fill="none" stroke-width="1.05">
    <path d="M60,60 Q26,34 0,0"/>
    <path d="M60,60 Q94,34 120,0"/>
    <path d="M60,60 Q26,86 0,120"/>
    <path d="M60,60 Q94,86 120,120"/>
    <!-- tiny curling leaves on the stems -->
    <path d="M43,47 q-7,1 -10,7"/>
    <path d="M77,47 q7,1 10,7"/>
    <path d="M43,73 q-7,-1 -10,-7"/>
    <path d="M77,73 q7,-1 10,-7"/>
  </g>

  <!-- four-petal flowers at the lattice nodes (corners + centre) -->
  <g opacity="0.13">
    <use href="#fl" x="0" y="0"/>
    <use href="#fl" x="120" y="0"/>
    <use href="#fl" x="0" y="120"/>
    <use href="#fl" x="120" y="120"/>
    <use href="#fl" x="60" y="60"/>
  </g>

  <!-- small buds at the edge midpoints -->
  <g opacity="0.13" fill="#6f4f33">
    <circle cx="60" cy="0" r="1.3"/>
    <circle cx="0" cy="60" r="1.3"/>
    <circle cx="120" cy="60" r="1.3"/>
    <circle cx="60" cy="120" r="1.3"/>
  </g>
</svg>
