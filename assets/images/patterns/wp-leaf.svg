<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 130" width="110" height="130">
  <!-- Flores wallpaper · botanical sprig (eucalyptus). Tone-on-tone sage, seamless grid. -->
  <g fill="none" stroke="#5f6e44" stroke-opacity="0.16" stroke-width="1.1" stroke-linecap="round">
    <!-- stem -->
    <path d="M55,122 C51,100 59,80 55,58 C52,42 56,30 55,18"/>
    <!-- leaf pairs -->
    <ellipse cx="43" cy="100" rx="8.5" ry="4.6" transform="rotate(-32 43 100)"/>
    <ellipse cx="67" cy="100" rx="8.5" ry="4.6" transform="rotate(32 67 100)"/>
    <ellipse cx="45" cy="80" rx="8" ry="4.3" transform="rotate(-30 45 80)"/>
    <ellipse cx="65" cy="80" rx="8" ry="4.3" transform="rotate(30 65 80)"/>
    <ellipse cx="44" cy="60" rx="7.5" ry="4" transform="rotate(-30 44 60)"/>
    <ellipse cx="66" cy="60" rx="7.5" ry="4" transform="rotate(30 66 60)"/>
    <ellipse cx="46" cy="41" rx="6.5" ry="3.6" transform="rotate(-28 46 41)"/>
    <ellipse cx="64" cy="41" rx="6.5" ry="3.6" transform="rotate(28 64 41)"/>
    <!-- top bud -->
    <circle cx="55" cy="16" r="2.4"/>
  </g>
</svg>
